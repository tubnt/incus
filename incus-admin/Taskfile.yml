version: '3'

tasks:
  build:
    desc: Build the server binary
    cmds:
      - CGO_ENABLED=0 go build -o bin/incus-admin ./cmd/server/

  dev:
    desc: Run with hot reload
    cmds:
      - go run ./cmd/server/

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  test-cover:
    desc: Run tests with coverage
    cmds:
      - go test -cover ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy

  web-build:
    desc: Build frontend
    dir: web
    cmds:
      - bun run build

  web-lint:
    desc: Lint frontend
    dir: web
    cmds:
      - bunx eslint .

  web-typecheck:
    desc: Typecheck frontend
    dir: web
    cmds:
      - bunx tsc --noEmit

  deploy:
    desc: Build and deploy to server
    cmds:
      - task: web-build
      - rm -rf internal/server/dist
      - cp -r web/dist internal/server/dist
      - task: build
