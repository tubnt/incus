version: '3'

tasks:
  build:
    desc: Build the server binary (always syncs web/dist → internal/server/dist first so //go:embed picks up the latest frontend bundle)
    cmds:
      - task: web-sync
      - CGO_ENABLED=0 go build -o bin/incus-admin ./cmd/server/

  web-sync:
    desc: "Sync web/dist → internal/server/dist (the actual //go:embed source). CRITICAL: without this, go build embeds a stale frontend and the deployed binary serves old UI. Run task web-build first to refresh web/dist."
    cmds:
      - rm -rf internal/server/dist
      - cp -r web/dist internal/server/dist

  dev:
    desc: Run with hot reload
    cmds:
      - go run ./cmd/server/

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  test-cover:
    desc: Run tests with coverage
    cmds:
      - go test -cover ./...

  test-integration:
    desc: Run integration tests (requires Docker; testcontainers spins up Postgres)
    env:
      TESTCONTAINERS_RYUK_DISABLED: true
    cmds:
      - go test -tags=integration -timeout 10m ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy

  web-build:
    desc: Build frontend
    dir: web
    cmds:
      - bun run build

  web-lint:
    desc: Lint frontend
    dir: web
    cmds:
      - bunx eslint .

  web-typecheck:
    desc: Typecheck frontend
    dir: web
    cmds:
      - bunx tsc --noEmit

  deploy:
    desc: Full rebuild (frontend + sync + backend) — use for any release that ships UI changes
    cmds:
      - task: web-build
      - task: build
